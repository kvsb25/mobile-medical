services:
  postgres-default:
    image: postgres:14
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hosp
    ports:
      - "5432:5432"
    volumes:
      - postgres_default_data:/var/lib/postgresql/data
    networks:
      - swassthya-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hosp"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  postgres-north:
    image: postgres:14
    container_name: postgres-db-north
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: northdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_north_data:/var/lib/postgresql/data
    networks:
      - swassthya-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d northdb"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  postgres-south:
    image: postgres:14
    container_name: postgres-db-south
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: southdb
    ports:
      - "5434:5432"
    volumes:
      - postgres_south_data:/var/lib/postgresql/data
    networks:
      - swassthya-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d southdb"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  redis:
    image: redis:latest
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - swassthya-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - swassthya-net

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - swassthya-net

  main-service:
    build:
      context: ./
    container_name: swassthya-main-service
    restart: on-failure
    environment:
      - DB_DEFAULT_USER=postgres
      - DB_DEFAULT_PASSWORD=postgres
      - DB_DEFAULT_HOST=postgres-db
      - DB_DEFAULT_PORT=5432
      - DB_DEFAULT_NAME=hosp

      - DB_NORTH_USER=postgres
      - DB_NORTH_PASSWORD=postgres
      - DB_NORTH_HOST=postgres-db-north
      # Container listens on 5432; host maps 5433 -> 5432
      - DB_NORTH_PORT=5432
      - DB_NORTH_NAME=northdb

      - DB_SOUTH_USER=postgres
      - DB_SOUTH_PASSWORD=postgres
      - DB_SOUTH_HOST=postgres-db-south
      # Must be 5432 inside the Docker network (not host port 5434)
      - DB_SOUTH_PORT=5432
      - DB_SOUTH_NAME=southdb

      - KAFKA_BROKER=kafka:9092
      - REDIS_URL=redis:6379
      - JWTSECRET=dev-change-me-in-production
    depends_on:
      postgres-default:
        condition: service_healthy
      postgres-north:
        condition: service_healthy
      postgres-south:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "2426:2426"
    networks:
      - swassthya-net

networks:
  swassthya-net:
    driver: bridge

volumes:
  postgres_default_data:
  postgres_north_data:
  postgres_south_data:
